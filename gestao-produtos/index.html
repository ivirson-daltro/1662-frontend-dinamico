<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <div id="app" class="container py-3">
      <h1>Gerenciador de Produtos</h1>

      <form id="form-produto" class="mb-4" data-action="salvar">
        <input type="hidden" id="id" />

        <div class="row">
          <div class="col mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input
              class="form-control"
              id="nome"
              placeholder="Digite o nome do produto"
            />
          </div>

          <div class="col mb-3">
            <label for="preco" class="form-label">Preço</label>
            <input type="number" class="form-control" id="preco" />
          </div>

          <div class="col mb-3">
            <label for="categoria" class="form-label">Categoria</label>
            <select
              class="form-select"
              aria-label="Default select example"
              id="categoria"
            >
              <option value="">Escolha categoria</option>
              <option value="Eletrônicos">Eletrônicos</option>
              <option value="Alimentos">Alimentos</option>
              <option value="Roupas">Roupas</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="salvar">
          Salvar Produto
        </button>
      </form>

      <!-- <div id="filtros"></div> -->

      <div class="row px-3" id="lista-produtos"></div>

      <!-- <div id="total">Total: R$ 0</div> -->
    </div>

    <script src="js/validacao.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
